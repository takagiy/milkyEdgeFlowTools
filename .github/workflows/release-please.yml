name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1

  upload-extension:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install Blender
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxi6 libxxf86vm1 libxfixes3 libxrender1 libgl1 libegl1 \
            libxkbcommon0 libsm6
          curl -fsSL "https://download.blender.org/release/Blender5.0/blender-5.0.1-linux-x64.tar.xz" \
            -o /tmp/blender.tar.xz
          mkdir -p "$HOME/blender"
          tar -xf /tmp/blender.tar.xz -C "$HOME/blender" --strip-components=1
          echo "BLENDER=$HOME/blender/blender" >> "$GITHUB_ENV"

      - name: Build extension
        run: uv run poe build

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/*.zip
